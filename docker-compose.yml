services:
  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - "3130:3130"
    environment:
      - DATABASE_URL=file:/app/data/grocery.db
      - LIBRETRANSLATE_URL=http://libretranslate:5000
      - PORT=3130
      - NODE_ENV=production
    volumes:
      - grocery-data:/app/data
    depends_on:
      - libretranslate
    restart: unless-stopped

  scraper:
    build:
      context: .
      dockerfile: packages/scraper/Dockerfile
    environment:
      - DATABASE_URL=file:/app/data/grocery.db
      - LIBRETRANSLATE_URL=http://libretranslate:5000
      - SCRAPE_HEADLESS=true
      - SCRAPE_INTERVAL_HOURS=24
    volumes:
      - grocery-data:/app/data
    depends_on:
      - libretranslate
      - web
    restart: unless-stopped

  libretranslate:
    image: libretranslate/libretranslate:latest
    ports:
      - "5000:5000"
    environment:
      - LT_LOAD_ONLY=lt,en
    volumes:
      - lt-data:/home/libretranslate/.local
    restart: unless-stopped

volumes:
  grocery-data:
  lt-data:
