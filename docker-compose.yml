services:
  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - "127.0.0.1:3131:3131"
    environment:
      - DATABASE_URL=file:/app/data/grocery.db
      - EMBEDDER_URL=http://embedder:8000
      - PORT=3131
      - NODE_ENV=production
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXT_PUBLIC_ADSENSE_ID=${NEXT_PUBLIC_ADSENSE_ID:-}
      - AUTH_SECRET=${AUTH_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - FACEBOOK_CLIENT_ID=${FACEBOOK_CLIENT_ID}
      - FACEBOOK_CLIENT_SECRET=${FACEBOOK_CLIENT_SECRET}
    volumes:
      - ./packages/data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3131/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  scraper:
    build:
      context: .
      dockerfile: packages/scraper/Dockerfile
    environment:
      - DATABASE_URL=file:/app/data/grocery.db
      - EMBEDDER_URL=http://embedder:8000
      - SCRAPE_HEADLESS=true
      - SCRAPE_INTERVAL_HOURS=24
      - GIT_TOKEN=${GIT_TOKEN:-}
      - GIT_REPO_URL=https://github.com/alporak/lt-grocery-master-db.git
    volumes:
      - ./packages/data:/app/data
    depends_on:
      web:
        condition: service_healthy
      embedder:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  embedder:
    build:
      context: .
      dockerfile: packages/embedder/Dockerfile
    environment:
      - DATA_DIR=/app/data
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_BATCH_SIZE=${GEMINI_BATCH_SIZE:-50}
      - GEMINI_THINKING_BUDGET=${GEMINI_THINKING_BUDGET:-0}
      - GEMINI_EMBEDDING_DIM=${GEMINI_EMBEDDING_DIM:-768}
    volumes:
      - ./packages/data:/app/data
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    environment:
      - TUNNEL_METRICS=0.0.0.0:49312
      - TUNNEL_LOGLEVEL=info
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:49312/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backup:
    image: alpine:3.20
    command: sh -c "apk add --no-cache sqlite dcron && echo '0 3 * * * /scripts/backup.sh >> /var/log/backup.log 2>&1' | crontab - && crond -f -l 2"
    volumes:
      - ./packages/data:/app/data:ro
      - ./backups:/backups
      - ./scripts/backup.sh:/scripts/backup.sh:ro
    environment:
      - DB_PATH=/app/data/grocery.db
      - BACKUP_DIR=/backups
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
