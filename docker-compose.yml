services:
  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - "3130:3130"
    environment:
      - DATABASE_URL=file:/app/data/grocery.db
      - LIBRETRANSLATE_URL=http://libretranslate:5000
      - EMBEDDER_URL=http://embedder:8000
      - PORT=3130
      - NODE_ENV=production
    volumes:
      - grocery-data:/app/data
    depends_on:
      - libretranslate
    restart: unless-stopped

  scraper:
    build:
      context: .
      dockerfile: packages/scraper/Dockerfile
    environment:
      - DATABASE_URL=file:/app/data/grocery.db
      - LIBRETRANSLATE_URL=http://libretranslate:5000
      - EMBEDDER_URL=http://embedder:8000
      - SCRAPE_HEADLESS=true
      - SCRAPE_INTERVAL_HOURS=24
    volumes:
      - grocery-data:/app/data
    depends_on:
      - libretranslate
      - web
      - embedder
    restart: unless-stopped

  embedder:
    build:
      context: .
      dockerfile: packages/embedder/Dockerfile
    environment:
      - DATA_DIR=/app/data
      - MODEL_NAME=sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.1-8b-instant}
      - GROQ_BATCH_SIZE=${GROQ_BATCH_SIZE:-10}
      - OLLAMA_URL=${OLLAMA_URL:-}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - SAMBANOVA_API_KEY=${SAMBANOVA_API_KEY}
      - HYPERBOLIC_API_KEY=${HYPERBOLIC_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - SCALEWAY_API_KEY=${SCALEWAY_API_KEY}
      - NOVITA_API_KEY=${NOVITA_API_KEY}
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY}
    volumes:
      - grocery-data:/app/data
    depends_on:
      - libretranslate
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped

  libretranslate:
    image: libretranslate/libretranslate:latest
    ports:
      - "5000:5000"
    environment:
      - LT_LOAD_ONLY=lt,en
    volumes:
      - lt-data:/home/libretranslate/.local
    restart: unless-stopped

volumes:
  grocery-data:
  lt-data:
