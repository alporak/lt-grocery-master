services:
  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - "3130:3130"
    environment:
      - DATABASE_URL=file:/app/data/grocery.db
      - LIBRETRANSLATE_URL=http://libretranslate:5000
      - EMBEDDER_URL=http://embedder:8000
      - PORT=3130
      - NODE_ENV=production
    volumes:
      - grocery-data:/app/data
    depends_on:
      - libretranslate
    restart: unless-stopped

  scraper:
    build:
      context: .
      dockerfile: packages/scraper/Dockerfile
    profiles: ["scraper", "full"]
    environment:
      - DATABASE_URL=file:/app/data/grocery.db
      - LIBRETRANSLATE_URL=http://libretranslate:5000
      - EMBEDDER_URL=http://embedder:8000
      - SCRAPE_HEADLESS=true
      - SCRAPE_INTERVAL_HOURS=24
    volumes:
      - grocery-data:/app/data
    depends_on:
      - libretranslate
      - web
      - embedder
    restart: unless-stopped

  embedder:
    build:
      context: .
      dockerfile: packages/embedder/Dockerfile
    environment:
      - DATA_DIR=/app/data
      - MODEL_NAME=sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=gemma2:2b
      - ENRICH_BATCH_SIZE=500
    volumes:
      - grocery-data:/app/data
    depends_on:
      - libretranslate
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    profiles: ["full"]
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 3G
    restart: unless-stopped

  libretranslate:
    image: libretranslate/libretranslate:latest
    ports:
      - "5000:5000"
    environment:
      - LT_LOAD_ONLY=lt,en
    volumes:
      - lt-data:/home/libretranslate/.local
    restart: unless-stopped

volumes:
  grocery-data:
  lt-data:
  ollama-data:
