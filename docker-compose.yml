services:
  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - "3130:3130"
    environment:
      - DATABASE_URL=file:/app/data/grocery.db
      - EMBEDDER_URL=http://embedder:8000
      - PORT=3130
      - NODE_ENV=production
    volumes:
      - grocery-data:/app/data
    restart: unless-stopped

  scraper:
    build:
      context: .
      dockerfile: packages/scraper/Dockerfile
    environment:
      - DATABASE_URL=file:/app/data/grocery.db
      - EMBEDDER_URL=http://embedder:8000
      - SCRAPE_HEADLESS=true
      - SCRAPE_INTERVAL_HOURS=24
    volumes:
      - grocery-data:/app/data
    depends_on:
      - web
      - embedder
    restart: unless-stopped

  embedder:
    build:
      context: .
      dockerfile: packages/embedder/Dockerfile
    environment:
      - DATA_DIR=/app/data
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - GEMINI_BATCH_SIZE=${GEMINI_BATCH_SIZE:-50}
      - GEMINI_THINKING_BUDGET=${GEMINI_THINKING_BUDGET:-0}
      - GEMINI_EMBEDDING_MODEL=${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}
      - GEMINI_EMBEDDING_DIM=${GEMINI_EMBEDDING_DIM:-768}
    volumes:
      - grocery-data:/app/data
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

volumes:
  grocery-data:
