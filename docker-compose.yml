services:
  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - "3131:3131"
    environment:
      - DATABASE_URL=file:/app/data/grocery.db
      - EMBEDDER_URL=http://embedder:8000
      - PORT=3131
      - NODE_ENV=production
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - FACEBOOK_CLIENT_ID=${FACEBOOK_CLIENT_ID}
      - FACEBOOK_CLIENT_SECRET=${FACEBOOK_CLIENT_SECRET}
    volumes:
      - ./packages/data:/app/data
    restart: unless-stopped

  scraper:
    build:
      context: .
      dockerfile: packages/scraper/Dockerfile
    environment:
      - DATABASE_URL=file:/app/data/grocery.db
      - EMBEDDER_URL=http://embedder:8000
      - SCRAPE_HEADLESS=true
      - SCRAPE_INTERVAL_HOURS=24
      - GIT_TOKEN=${GIT_TOKEN:-}
      - GIT_REPO_URL=https://github.com/alporak/lt-grocery-master-db.git
    volumes:
      - ./packages/data:/app/data
    depends_on:
      - web
      - embedder
    restart: unless-stopped

  embedder:
    build:
      context: .
      dockerfile: packages/embedder/Dockerfile
    environment:
      - DATA_DIR=/app/data
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_BATCH_SIZE=${GEMINI_BATCH_SIZE:-50}
      - GEMINI_THINKING_BUDGET=${GEMINI_THINKING_BUDGET:-0}
      - GEMINI_EMBEDDING_DIM=${GEMINI_EMBEDDING_DIM:-768}
    volumes:
      - ./packages/data:/app/data
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
